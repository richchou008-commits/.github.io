<!DOCTYPE html>
<html lang="zh-TW">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-banner" style="display: flex; align-items: center; justify-content: space-between;">
        <img src="images/c.png" alt="c Logo" style="height: 80px;"> <!-- 這裡是對應語言的 png -->
        <img src="images/banner.png" alt="Chou Easy Banner">
        <h1 style="color: white; margin: 0;">C語言</h1>
         <center><input type="button" onclick="location.href='c.html';" value="返回課程選擇" /></center>
       <button onclick="prevSlide()">◀上一單元</button>
       <button onclick="nextSlide()">下一單元▶</button>
    </header>
    <iframe 
  id="pdfViewer"
  src="CpdFile/Cslides00.pdf"
  width="100%" 
  height="700px">
</iframe>

<center>
    <button onclick="prevSlide()">◀上一單元</button>
    <button onclick="nextSlide()">下一單元▶</button>
</center>

<script>
let slides = [
  "CpdFile/Cslides00.pdf#toolbar=0",
  "CpdFile/Cslides01.pdf#toolbar=0",
  "CpdFile/Cslides02.pdf#toolbar=0",
  "CpdFile/Cslides03.pdf#toolbar=0",
  "CpdFile/Cslides04.pdf#toolbar=0",
  "CpdFile/Cslides05.pdf#toolbar=0",
  "CpdFile/Cslides06.pdf#toolbar=0",
];

let index = 0;

function nextSlide() {
  index = (index + 1) % slides.length;
  document.getElementById("pdfViewer").src = slides[index];
}

function prevSlide() {
  index = (index - 1 + slides.length) % slides.length;
  document.getElementById("pdfViewer").src = slides[index];
}
</script>
